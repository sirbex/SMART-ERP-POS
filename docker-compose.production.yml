# ============================================================
# DOCKER COMPOSE - SCALABLE ARCHITECTURE
# Horizontal scaling with load balancing
# ============================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: samplepos_postgres
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MAX_CONNECTIONS: 200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - samplepos_network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Distributed Cache + Job Queue)
  redis:
    image: redis:7-alpine
    container_name: samplepos_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - samplepos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend instances (scalable)
  backend1:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend1
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      INSTANCE_ID: backend1
    depends_on:
      - postgres
      - redis
    networks:
      - samplepos_network
    restart: unless-stopped

  backend2:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend2
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      INSTANCE_ID: backend2
    depends_on:
      - postgres
      - redis
    networks:
      - samplepos_network
    restart: unless-stopped

  backend3:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend3
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      INSTANCE_ID: backend3
    depends_on:
      - postgres
      - redis
    networks:
      - samplepos_network
    restart: unless-stopped

  # Job Queue Workers (separate from API servers)
  worker1:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_worker1
    command: node dist/workers/jobProcessor.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      WORKER_ID: worker1
      WORKER_CONCURRENCY: 5
    depends_on:
      - postgres
      - redis
    networks:
      - samplepos_network
    restart: unless-stopped

  worker2:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_worker2
    command: node dist/workers/jobProcessor.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      WORKER_ID: worker2
      WORKER_CONCURRENCY: 5
    depends_on:
      - postgres
      - redis
    networks:
      - samplepos_network
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: samplepos_nginx
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./samplepos.client/dist:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - samplepos_network
    restart: unless-stopped

  # Monitoring (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: samplepos_prometheus
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    networks:
      - samplepos_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: samplepos_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - samplepos_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
  prometheus_data:
  grafana_data:

networks:
  samplepos_network:
    driver: bridge

# Scaling commands:
# docker-compose up --scale backend=5 --scale worker=3
# docker-compose up --scale backend1=2 backend2=2 backend3=1
