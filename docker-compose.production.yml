# ============================================================
# DOCKER COMPOSE - SCALABLE ARCHITECTURE
# Horizontal scaling with load balancing
# ============================================================

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: samplepos_postgres
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_MAX_CONNECTIONS: 200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - samplepos_network
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # Redis (Distributed Cache + Job Queue)
  redis:
    image: redis:7-alpine
    container_name: samplepos_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - samplepos_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Backend instances (scalable)
  backend1:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend1
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 3001
      INSTANCE_ID: backend1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplepos_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  backend2:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend2
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 3001
      INSTANCE_ID: backend2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplepos_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  backend3:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_backend3
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      PORT: 3001
      INSTANCE_ID: backend3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplepos_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # Job Queue Workers (separate from API servers)
  worker1:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_worker1
    command: node dist/workers/jobProcessor.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      WORKER_ID: worker1
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplepos_network
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    restart: unless-stopped

  worker2:
    build:
      context: ./SamplePOS.Server
      dockerfile: Dockerfile
    container_name: samplepos_worker2
    command: node dist/workers/jobProcessor.js
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/pos_system
      REDIS_URL: redis://redis:6379
      WORKER_ID: worker2
      WORKER_CONCURRENCY: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - samplepos_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'

  # Nginx Load Balancer + SSL Termination
  nginx:
    image: nginx:alpine
    container_name: samplepos_nginx
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./samplepos.client/dist:/usr/share/nginx/html:ro
      - nginx_cache:/var/cache/nginx
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend1
      - backend2
      - backend3
    networks:
      - samplepos_network
    restart: unless-stopped
    # Reload nginx every 6h to pick up renewed certs
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Let's Encrypt certificate auto-renewal
  certbot:
    image: certbot/certbot
    container_name: samplepos_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew every 12h (certbot is a no-op if cert is still valid)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - samplepos_network
    restart: unless-stopped

  # Monitoring (Prometheus + Grafana)
  prometheus:
    image: prom/prometheus:latest
    container_name: samplepos_prometheus
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    networks:
      - samplepos_network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: samplepos_alertmanager
    volumes:
      - ./infrastructure/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    networks:
      - samplepos_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: samplepos_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - samplepos_network
    restart: unless-stopped

  # Automated Database Backups (every 6 hours, 30-day retention)
  db-backup:
    image: postgres:15-alpine
    container_name: samplepos_db_backup
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: pos_system
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: "30"
    volumes:
      - ./infrastructure/backup.sh:/usr/local/bin/backup.sh:ro
      - db_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - samplepos_network
    restart: unless-stopped
    entrypoint: "/bin/sh -c 'chmod +x /usr/local/bin/backup.sh; while true; do /usr/local/bin/backup.sh; sleep 21600; done'"

volumes:
  postgres_data:
  redis_data:
  nginx_cache:
  certbot_conf:
  certbot_www:
  prometheus_data:
  grafana_data:
  db_backups:


networks:
  samplepos_network:
    driver: bridge

# Scaling commands:
# docker-compose up --scale backend=5 --scale worker=3
# docker-compose up --scale backend1=2 backend2=2 backend3=1
