<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Check | SamplePOS System</title>
    <link rel="stylesheet" href="price-check.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Price Check</h1>
            <span class="app-version">SamplePOS System v1.5.0</span>
        </header>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Enter SKU, barcode, or product name...">
            <div class="loader" id="search-loader"></div>
            <button id="search-button">Search</button>
        </div>

        <div class="search-options">
            <div class="search-option">
                <input type="checkbox" id="exact-match" name="exact-match">
                <label for="exact-match">Exact name match</label>
            </div>
        </div>

        <div class="search-sources">
            <div class="search-source">
                <span class="source-indicator source-primary"></span>
                <span>Primary Inventory</span>
            </div>
            <div class="search-source">
                <span class="source-indicator source-product"></span>
                <span>Product Inventory</span>
            </div>
            <div class="search-source">
                <span class="source-indicator source-legacy"></span>
                <span>Legacy Inventory</span>
            </div>
        </div>

        <div id="result"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchButton = document.getElementById('search-button');
            const searchInput = document.getElementById('search-input');
            const resultContainer = document.getElementById('result');
            const searchLoader = document.getElementById('search-loader');
            const exactMatchCheckbox = document.getElementById('exact-match');

            // Storage keys to check for inventory data
            const STORAGE_KEYS = {
                INVENTORY: 'inventory_items',          // Primary inventory storage
                INVENTORY_PRODUCTS: 'inventory_products', // Secondary inventory storage
                INVENTORY_LEGACY: 'pos_inventory_v3'   // Legacy inventory format
            };

            searchButton.addEventListener('click', performSearch);
            searchInput.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') {
                    performSearch();
                }
            });

            function formatCurrency(amount) {
                if (amount === null || amount === undefined || amount === '') return 'Not set';
                return new Intl.NumberFormat('en-US', { 
                    style: 'currency', 
                    currency: 'USD',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }).format(+amount);
            }

            function getSourceColor(source) {
                switch(source) {
                    case 'Primary Inventory': return '#0070f3';
                    case 'Product Inventory': return '#00c853';
                    case 'Legacy Inventory': return '#ff9800';
                    default: return '#666666';
                }
            }

            function formatDate(dateString) {
                if (!dateString) return 'N/A';
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return 'Invalid date';
                
                return new Intl.DateTimeFormat('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                }).format(date);
            }

            function checkExpiryStatus(expiryDate) {
                if (!expiryDate) return null;
                
                const today = new Date();
                const expiry = new Date(expiryDate);
                
                if (isNaN(expiry.getTime())) return null;
                
                // Calculate days until expiry
                const daysUntilExpiry = Math.floor((expiry - today) / (1000 * 60 * 60 * 24));
                
                if (daysUntilExpiry < 0) {
                    return { status: 'expired', days: Math.abs(daysUntilExpiry), message: `Expired ${Math.abs(daysUntilExpiry)} days ago` };
                } else if (daysUntilExpiry <= 30) {
                    return { status: 'expiring-soon', days: daysUntilExpiry, message: `Expires in ${daysUntilExpiry} days` };
                }
                
                return { status: 'valid', days: daysUntilExpiry, message: `Expires in ${daysUntilExpiry} days` };
            }

            async function performSearch() {
                const query = searchInput.value.trim();
                if (!query) return;

                // Show loading indicator
                searchLoader.style.display = 'block';
                resultContainer.style.display = 'none';

                // Get inventory from all possible localStorage locations
                const inventorySources = [
                    { key: STORAGE_KEYS.INVENTORY, name: 'Primary Inventory' },
                    { key: STORAGE_KEYS.INVENTORY_PRODUCTS, name: 'Product Inventory' },
                    { key: STORAGE_KEYS.INVENTORY_LEGACY, name: 'Legacy Inventory' }
                ];

                let allProducts = [];
                let foundProducts = [];

                // Process each inventory source
                inventorySources.forEach(source => {
                    try {
                        const rawData = localStorage.getItem(source.key);
                        if (!rawData) return;
                        
                        const data = JSON.parse(rawData);
                        if (!Array.isArray(data) || data.length === 0) return;
                        
                        // Add source information to each item
                        const productsWithSource = data.map(item => ({
                            ...item,
                            source: source.name,
                            sourceColor: getSourceColor(source.name)
                        }));
                        
                        allProducts = allProducts.concat(productsWithSource);
                    } catch (error) {
                        console.error(`Error loading from ${source.key}:`, error);
                    }
                });

                // Simulate network delay for better UX
                await new Promise(resolve => setTimeout(resolve, 500));

                const isExactMatch = exactMatchCheckbox.checked;

                // Search for product(s)
                foundProducts = allProducts.filter(item => {
                    // Check by name
                    const nameMatch = item.name && (
                        isExactMatch 
                            ? item.name.toLowerCase() === query.toLowerCase()
                            : item.name.toLowerCase().includes(query.toLowerCase())
                    );
                    
                    // Check by SKU (exact match only)
                    const skuMatch = item.sku && item.sku.toLowerCase() === query.toLowerCase();
                    
                    // Check by barcode (exact match only)
                    const barcodeMatch = item.barcode && item.barcode === query;
                    
                    return nameMatch || skuMatch || barcodeMatch;
                });

                // Hide loading indicator
                searchLoader.style.display = 'none';
                resultContainer.style.display = 'block';

                // Display results
                displayResults(foundProducts, query);
            }

            function displayResults(products, query) {
                if (products.length === 0) {
                    resultContainer.innerHTML = `
                        <div class="result-header">
                            <h2>No Results Found</h2>
                        </div>
                        <div class="result-content">
                            <p class="not-found">No products found matching "${query}"</p>
                        </div>
                    `;
                    return;
                }

                // Sort by name for consistency
                products.sort((a, b) => a.name.localeCompare(b.name));

                // If multiple products with same name but different sources, prioritize the primary inventory
                const uniqueProducts = {};
                products.forEach(product => {
                    if (!uniqueProducts[product.name] || 
                        product.source === 'Primary Inventory') {
                        uniqueProducts[product.name] = product;
                    }
                });

                const displayedProducts = Object.values(uniqueProducts);

                // If we have only one product, show detailed view
                if (displayedProducts.length === 1) {
                    displaySingleProduct(displayedProducts[0]);
                } else {
                    displayProductList(displayedProducts);
                }
            }

            function displayProductList(products) {
                let productsHTML = '';
                
                products.forEach(product => {
                    const price = formatCurrency(product.price);
                    const quantity = typeof product.quantity === 'number' || typeof product.quantity === 'string' 
                        ? product.quantity 
                        : 'N/A';
                    
                    productsHTML += `
                        <div class="item-section item-section-with-color" style="border-left-color: ${product.sourceColor};">
                            <div class="item-header">
                                <div class="item-main-info">
                                    <h3 class="item-name">${product.name}</h3>
                                    ${product.category ? `<span class="item-category">${product.category}</span>` : ''}
                                    <span class="info-value source-text" style="color: ${product.sourceColor};">
                                        ${product.source}
                                    </span>
                                </div>
                                <div class="item-price-container">
                                    <p class="item-price">${price}</p>
                                    <span class="price-per-unit">per ${product.unit || 'unit'}</span>
                                </div>
                            </div>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">SKU</span>
                                    <span class="info-value">${product.sku || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Barcode</span>
                                    <span class="info-value">${product.barcode || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Stock</span>
                                    <span class="info-value">${quantity} ${product.unit || 'units'}</span>
                                </div>
                            </div>
                            <button class="btn-details" onclick="showProductDetails('${encodeURIComponent(JSON.stringify(product))}')" 
                                style="border-color: ${product.sourceColor}; color: ${product.sourceColor};">
                                View Details
                            </button>
                        </div>
                    `;
                });

                resultContainer.innerHTML = `
                    <div class="result-header">
                        <h2>Found ${products.length} Products</h2>
                    </div>
                    <div class="result-content">
                        ${productsHTML}
                    </div>
                `;
            }

            function displaySingleProduct(product) {
                const price = formatCurrency(product.price);
                const costPrice = formatCurrency(product.costPrice);
                const quantity = typeof product.quantity === 'number' || typeof product.quantity === 'string' 
                    ? product.quantity 
                    : 'N/A';
                
                // Handle expiry date if present
                let expiryHTML = '';
                if (product.hasExpiry && product.expiry) {
                    const expiryStatus = checkExpiryStatus(product.expiry);
                    if (expiryStatus) {
                        const expiryClass = expiryStatus.status === 'expired' ? 'expiry-expired' : 'expiry-warning';
                        if (expiryStatus.status !== 'valid') {
                            expiryHTML = `
                                <div class="expiry-warning ${expiryClass}">
                                    <strong>Expiry Alert:</strong> ${expiryStatus.message}
                                </div>
                            `;
                        }
                    }
                }
                
                // Handle units of measure if present
                let uomHTML = '';
                if (product.uomOptions && product.uomOptions.length > 0) {
                    uomHTML = `
                        <div class="item-section">
                            <h3 class="section-title">Units of Measure</h3>
                            <table class="uom-table">
                                <thead>
                                    <tr>
                                        <th>Unit</th>
                                        <th>Price</th>
                                        <th>Conversion</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    
                    product.uomOptions.forEach(uom => {
                        uomHTML += `
                            <tr>
                                <td>${uom.name} ${uom.isBase ? '(Base)' : ''}</td>
                                <td>${uom.price ? formatCurrency(uom.price) : 'N/A'}</td>
                                <td>${uom.conversionFactor} ${uom.isBase ? '' : `(1 ${uom.name} = ${uom.conversionFactor} ${product.unit || 'units'})`}</td>
                            </tr>
                        `;
                    });
                    
                    uomHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;
                } else if (product.conversions && Object.keys(product.conversions).length > 0) {
                    uomHTML = `
                        <div class="item-section">
                            <h3 class="section-title">Units of Measure</h3>
                            <table class="uom-table">
                                <thead>
                                    <tr>
                                        <th>Unit</th>
                                        <th>Conversion</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>${product.unit || 'unit'} (Base)</td>
                                        <td>1</td>
                                    </tr>
                    `;
                    
                    for (const [unit, conversion] of Object.entries(product.conversions)) {
                        if (conversion && conversion !== '') {
                            uomHTML += `
                                <tr>
                                    <td>${unit}</td>
                                    <td>1 ${unit} = ${conversion} ${product.unit || 'units'}</td>
                                </tr>
                            `;
                        }
                    }
                    
                    uomHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;
                }
                
                // Purchase info section
                let purchaseInfoHTML = '';
                if (product.purchaseInfo) {
                    const pi = product.purchaseInfo;
                    purchaseInfoHTML = `
                        <div class="item-section">
                            <h3 class="section-title">Purchase Information</h3>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">Purchase Unit</span>
                                    <span class="info-value">${pi.purchaseUnitName || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Cost Per Purchase Unit</span>
                                    <span class="info-value">${formatCurrency(pi.costPerPurchaseUnit)}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Qty Per Purchase Unit</span>
                                    <span class="info-value">${pi.quantityPerPurchaseUnit || 'N/A'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">Cost Per Base Unit</span>
                                    <span class="info-value">${formatCurrency(pi.costPerBaseUnit)}</span>
                                </div>
                                ${pi.supplierInfo ? `
                                <div class="info-item">
                                    <span class="info-label">Supplier Info</span>
                                    <span class="info-value">${pi.supplierInfo}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                } else if (product.lastPurchaseDate || product.lastPurchaseCost) {
                    purchaseInfoHTML = `
                        <div class="item-section">
                            <h3 class="section-title">Purchase Information</h3>
                            <div class="info-grid">
                                ${product.lastPurchaseDate ? `
                                <div class="info-item">
                                    <span class="info-label">Last Purchase Date</span>
                                    <span class="info-value">${formatDate(product.lastPurchaseDate)}</span>
                                </div>
                                ` : ''}
                                ${product.lastPurchaseCost ? `
                                <div class="info-item">
                                    <span class="info-label">Last Purchase Cost</span>
                                    <span class="info-value">${formatCurrency(product.lastPurchaseCost)}</span>
                                </div>
                                ` : ''}
                                ${product.supplier ? `
                                <div class="info-item">
                                    <span class="info-label">Supplier</span>
                                    <span class="info-value">${product.supplier}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }

                // Pricing section
                let pricingHTML = '';
                if (product.salesPricing || product.minPrice !== undefined) {
                    const sp = product.salesPricing || {};
                    pricingHTML = `
                        <div class="item-section">
                            <h3 class="section-title">Pricing Information</h3>
                            <div class="info-grid">
                                ${sp.markupPercentage !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Markup Percentage</span>
                                    <span class="info-value">${sp.markupPercentage}%</span>
                                </div>
                                ` : ''}
                                ${sp.minimumSellingPrice !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Minimum Selling Price</span>
                                    <span class="info-value">${formatCurrency(sp.minimumSellingPrice)}</span>
                                </div>
                                ` : product.minPrice !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Minimum Price</span>
                                    <span class="info-value">${formatCurrency(product.minPrice)}</span>
                                </div>
                                ` : ''}
                                ${sp.maxDiscountPercentage !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Max Discount</span>
                                    <span class="info-value">${sp.maxDiscountPercentage}%</span>
                                </div>
                                ` : ''}
                                ${product.costPrice !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Cost Price</span>
                                    <span class="info-value">${costPrice}</span>
                                </div>
                                ` : ''}
                                ${product.price !== undefined && product.costPrice !== undefined ? `
                                <div class="info-item">
                                    <span class="info-label">Profit Margin</span>
                                    <span class="info-value">${
                                        ((product.price - product.costPrice) / product.price * 100).toFixed(2)
                                    }%</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }

                resultContainer.innerHTML = `
                    <div class="result-header" style="background-color: ${product.sourceColor};">
                        <h2>${product.name}</h2>
                    </div>
                    <div class="result-content">
                        <div class="item-details">
                            <div class="item-header">
                                <div class="item-main-info">
                                    ${product.category ? `<span class="item-category">${product.category}</span>` : ''}
                                    <span class="info-value" style="color: ${product.sourceColor}; font-size: 12px;">
                                        ${product.source}
                                    </span>
                                </div>
                                <div class="item-price-container">
                                    <p class="item-price">${price}</p>
                                    <span class="price-per-unit">per ${product.unit || 'unit'}</span>
                                </div>
                            </div>
                            
                            ${expiryHTML}
                            
                            <div class="item-section">
                                <h3 class="section-title">Basic Information</h3>
                                <div class="info-grid">
                                    <div class="info-item">
                                        <span class="info-label">SKU</span>
                                        <span class="info-value">${product.sku || 'N/A'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Barcode</span>
                                        <span class="info-value">${product.barcode || 'N/A'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Stock Quantity</span>
                                        <span class="info-value">${quantity} ${product.unit || 'units'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Reorder Level</span>
                                        <span class="info-value">${product.reorderLevel || 'N/A'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Location</span>
                                        <span class="info-value">${product.location || 'N/A'}</span>
                                    </div>
                                    ${product.batch ? `
                                    <div class="info-item">
                                        <span class="info-label">Batch</span>
                                        <span class="info-value">${product.batch}</span>
                                    </div>
                                    ` : ''}
                                    ${product.hasExpiry ? `
                                    <div class="info-item">
                                        <span class="info-label">Expiry Date</span>
                                        <span class="info-value">${formatDate(product.expiry)}</span>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                            
                            ${uomHTML}
                            
                            ${purchaseInfoHTML}
                            
                            ${pricingHTML}
                            
                            ${product.notes ? `
                            <div class="item-section">
                                <h3 class="section-title">Notes</h3>
                                <p>${product.notes}</p>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            // Auto-focus on input when page loads
            searchInput.focus();

            // Global function for viewing product details from list view
            window.showProductDetails = function(productJson) {
                try {
                    const product = JSON.parse(decodeURIComponent(productJson));
                    displaySingleProduct(product);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) {
                    console.error('Failed to parse product data:', e);
                }
            };
        });
    </script>
</body>
</html>
