<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Sample POS</title>
  </head>
  <body>
    <div id="root">
      <!-- Loading indicator to prevent timeout perception -->
      <div id="initial-loader" style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; font-family: system-ui, -apple-system, sans-serif;">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;"></div>
        <p style="color: #666; margin: 0;">Loading SamplePOS...</p>
        <small style="color: #999; margin-top: 10px;">Initializing React application</small>
      </div>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear loading indicator when React starts
      document.addEventListener('DOMContentLoaded', function() {
        // The recovery.js script now handles timeout detection with better logic
        console.log('DOM loaded - React initialization starting...');
      });
    </script>
  </body>
</html>
